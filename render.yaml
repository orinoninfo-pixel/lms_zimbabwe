services:
  - type: web
    name: lms-zimbabwe
    runtime: node
    buildCommand: npm ci && npm run build
    preDeployCommand: npm run db:migrate:deploy
    startCommand: npm run start -- --hostname 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
